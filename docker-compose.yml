services:
  redis:
    image: redis:7-alpine
    container_name: 1section-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 1section-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      CLIENT_URL: https://1section.com
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LEMONSQUEEZY_API_KEY: ${LEMONSQUEEZY_API_KEY}
      LEMONSQUEEZY_STORE_ID: ${LEMONSQUEEZY_STORE_ID}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${LEMONSQUEEZY_WEBHOOK_SECRET}
      LS_VARIANT_MONTHLY: ${LS_VARIANT_MONTHLY:-1727361}
      LS_VARIANT_YEARLY: ${LS_VARIANT_YEARLY:-1727397}
      LS_VARIANT_LIFETIME: ${LS_VARIANT_LIFETIME:-1727400}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.1section.com/api
        NEXT_PUBLIC_WS_URL: wss://api.1section.com/ws
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    container_name: 1section-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.1section.com/api
    container_name: 1section-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    depends_on:
      - backend
